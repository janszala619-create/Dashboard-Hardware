# XcodeGen-Definition — erzeugt PCMonitor.xcodeproj im CI-Build
# (lokal: `xcodegen generate` im ios\-Ordner).
name: PCMonitor
options:
  bundleIdPrefix: de.jansz
  deploymentTarget:
    iOS: "17.0"

targets:
  PCMonitor:
    type: application
    platform: iOS
    sources:
      - PCMonitor
    info:
      path: PCMonitor/Info.plist
      properties:
        CFBundleDisplayName: PC Monitor
        UILaunchScreen: {}
        # iOS blockiert unverschlüsseltes HTTP standardmäßig —
        # diese beiden Einträge erlauben den Zugriff aufs lokale Netz.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSLocalNetworkUsageDescription: Verbindet sich mit dem PC-Monitoring-Server im lokalen Netzwerk.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.jansz.pcmonitor
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"

schemes:
  PCMonitor:
    build:
      targets:
        PCMonitor: all
